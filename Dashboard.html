<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f6fa;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 侧边栏 ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #fff;
      display: flex;
      flex-direction: column;
      padding: 32px 0;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px 36px;
      font-size: 15px;
      font-weight: 700;
      color: #2d3a6b;
    }

    .sidebar-logo span.icon {
      font-size: 22px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      font-size: 14px;
      color: #7b8db0;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .nav-item:hover {
      color: #2d3a6b;
    }

    .nav-item.active {
      color: #2d3a6b;
      font-weight: 600;
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 32px;
      background: #2d3a6b;
      border-radius: 0 4px 4px 0;
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── 主内容 ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 36px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .topbar h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a2340;
    }

    .avatar-wrapper {
      position: relative;
      width: 44px;
      height: 44px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .avatar-wrapper img,
    .avatar-wrapper svg {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #e8ecf5;
      object-fit: cover;
      display: block;
    }

    .avatar-wrapper:hover::after {
      content: '📷';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #avatarInput {
      display: none;
    }

    /* ── 图表网格 ── */
    .chart-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 20px;
      min-height: 0;
    }

    .chart-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chart-card h2 {
      font-size: 15px;
      font-weight: 700;
      color: #1a2340;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .chart-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    /* ── 饼图卡片：左右各占50%，等高对齐 ── */
    .pie-body {
      flex: 1;
      display: flex;
      align-items: stretch;
      /* 两侧等高 */
      gap: 16px;
      min-height: 0;
    }

    .pie-wrap {
      flex: 1;
      /* 占50% */
      position: relative;
      min-height: 0;
      min-width: 0;
    }

    /* 复合增长率卡片：与饼图等宽等高 */
    .compound-card {
      flex: 1;
      /* 占50% */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #f4f5fb;
      border-radius: 14px;
      padding: 20px;
      min-width: 0;
    }

    .compound-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #e0e4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .compound-label {
      font-size: 13px;
      color: #7b8db0;
      text-align: center;
      line-height: 1.6;
      font-weight: 500;
    }

    .compound-value {
      font-size: 28px;
      font-weight: 700;
      color: #2d3a6b;
      letter-spacing: 0.5px;
    }

    /* ── 柱状图图例 ── */
    .bar-legend {
      display: flex;
      gap: 16px;
      justify-content: flex-end;
      margin-bottom: 8px;
      font-size: 12px;
      color: #7b8db0;
      flex-shrink: 0;
    }

    .legend-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-right: 4px;
    }
  </style>
</head>

<body>

  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="icon">🏛️</span>
      <span>Personal finance stats</span>
    </div>

    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" />
        <path d="M9 21V12h6v9" />
      </svg>
      Real-time Dashboard
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <path d="M8 17V13M12 17V9M16 17V11" />
      </svg>
      Asset record
    </div>

    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 3C7 3 3 7 3 12s4 9 9 9 9-4 9-9" />
        <path d="M16 3l5 5-5 5" />
      </svg>
      All-weather portfolio
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div class="avatar-wrapper" onclick="document.getElementById('avatarInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" id="avatarDefault">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
        <img id="avatarImg" style="display:none" src="" alt="avatar" />
        <input type="file" id="avatarInput" accept="image/*" />
      </div>
    </div>

    <div class="chart-grid">

      <!-- 1. Total Assets 折线图 -->
      <div class="chart-card">
        <h2>Total Assets</h2>
        <div class="chart-wrap">
          <canvas id="totalAssetsChart"></canvas>
        </div>
      </div>

      <!-- 2. Asset Distribution 饼图 + 复合增长率 -->
      <div class="chart-card">
        <h2>Asset Distribution</h2>
        <div class="pie-body">

          <!-- 左：饼图 -->
          <div class="pie-wrap">
            <canvas id="assetPieChart"></canvas>
          </div>

          <!-- 右：复合增长率卡片，与饼图等大 -->
          <div class="compound-card">
            <div class="compound-icon">🔄</div>
            <div class="compound-label">Compound<br>Growth Rate</div>
            <div class="compound-value">+5.80%</div>
          </div>

        </div>
      </div>

      <!-- 3. Cash Flow 曲线图 -->
      <div class="chart-card">
        <h2>Cash Flow</h2>
        <div class="chart-wrap">
          <canvas id="cashFlowChart"></canvas>
        </div>
      </div>

      <!-- 4. Month-on-month Growth 柱状图 -->
      <div class="chart-card">
        <h2>Month-on-month Growth</h2>
        <div class="bar-legend">
          <span><span class="legend-dot" style="background:#FF6B9D"></span>Increase</span>
          <span><span class="legend-dot" style="background:#00D4B8"></span>Decrease</span>
        </div>
        <div class="chart-wrap">
          <canvas id="momChart"></canvas>
        </div>
      </div>

    </div>
  </main>

  <script>
    const gridColor = 'rgba(0,0,0,0.06)';
    const tickColor = '#a0aec0';
    const MILLISECONDS_PER_YEAR = 1000 * 60 * 60 * 24 * 365.25;
    let records = [];
    try {
      const rawRecords = JSON.parse(localStorage.getItem('assetRecords') || '[]');
      records = Array.isArray(rawRecords) ? rawRecords : [];
    } catch (e) {
      records = [];
    }
    const parsedRecords = records.map(r => {
      const pb = parseFloat(r.pinganBank) || 0;
      const ps = parseFloat(r.pinganSec) || 0;
      const ali = parseFloat(r.alipay) || 0;
      const agri = parseFloat(r.agriBank) || 0;
      const pbf = parseFloat(r.pinganBankFund) || 0;
      const psf = parseFloat(r.pinganSecFund) || 0;
      const alif = parseFloat(r.alipayFund) || 0;
      const sf = parseFloat(r.sfStock) || 0;
      const xqf = parseFloat(r.xueqiuFund) || 0;

      const cashFlow = (pb - pbf) + (ps - psf - sf) + (ali - alif) + agri;
      const fund = pbf + psf + alif + xqf;
      const stock = sf;
      const total = cashFlow + fund + stock;

      return {
        date: r.date || '',
        cashFlow,
        fund,
        stock,
        total
      };
    });
    const dates = parsedRecords.map(r => r.date);
    const totals = parsedRecords.map(r => r.total);
    const cashFlows = parsedRecords.map(r => r.cashFlow);

    function axisConfig() {
      return {
        x: {
          grid: { color: gridColor, drawBorder: false },
          ticks: { color: tickColor, font: { size: 11 } }
        },
        y: {
          grid: { color: gridColor, drawBorder: false },
          ticks: {
            color: tickColor,
            font: { size: 11 },
            callback: v => '¥' + v.toLocaleString()
          }
        }
      };
    }

    function formatPercentLabel(name, value, sum) {
      if (!sum) return `${name} 0%`;
      return `${name} ${Math.round((value / sum) * 100)}%`;
    }

    // ── 1. Total Assets ──
    new Chart(document.getElementById('totalAssetsChart'), {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          data: totals,
          borderColor: '#FF6B9D',
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#FF6B9D',
          pointBorderWidth: 2,
          pointRadius: 5,
          tension: 0.1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: axisConfig()
      }
    });

    // ── 2. Asset Distribution ──
    const latestRecord = parsedRecords[parsedRecords.length - 1];
    const latestCashFlow = latestRecord ? latestRecord.cashFlow : 0;
    const latestFund = latestRecord ? latestRecord.fund : 0;
    const latestStock = latestRecord ? latestRecord.stock : 0;
    const pieTotal = latestCashFlow + latestFund + latestStock;
    const pieLabels = latestRecord
      ? [
        formatPercentLabel('Cash Flow', latestCashFlow, pieTotal),
        formatPercentLabel('Fund', latestFund, pieTotal),
        formatPercentLabel('Stock', latestStock, pieTotal)
      ]
      : ['No data'];
    const pieData = latestRecord ? [latestCashFlow, latestFund, latestStock] : [1];
    const pieColors = latestRecord ? ['#8CC63F', '#F5A623', '#3B5BDB'] : ['#d9d9d9'];

    new Chart(document.getElementById('assetPieChart'), {
      type: 'pie',
      data: {
        labels: pieLabels,
        datasets: [{
          data: pieData,
          backgroundColor: pieColors,
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: { font: { size: 11 }, color: '#7b8db0', boxWidth: 12 }
          }
        }
      }
    });

    // ── 2.1 Compound Growth Rate ──
    const compoundValueEl = document.querySelector('.compound-value');
    const firstRecord = parsedRecords[0];
    const endRecord = latestRecord;

    if (firstRecord && endRecord && firstRecord.total > 0 && endRecord.total > 0) {
      const startDate = new Date(firstRecord.date);
      const endDate = new Date(endRecord.date);
      const yearsDiff = (endDate - startDate) / MILLISECONDS_PER_YEAR;

      if (yearsDiff > 0) {
        const cagr = Math.pow(endRecord.total / firstRecord.total, 1 / yearsDiff) - 1;
        if (Number.isFinite(cagr)) {
          const sign = cagr >= 0 ? '+' : '';
          compoundValueEl.textContent = `${sign}${(cagr * 100).toFixed(2)}%`;
          compoundValueEl.style.color = cagr >= 0 ? '#52C41A' : '#e53e3e';
        } else {
          compoundValueEl.textContent = '--';
          compoundValueEl.style.color = '#7b8db0';
        }
      } else {
        compoundValueEl.textContent = '--';
        compoundValueEl.style.color = '#7b8db0';
      }
    } else {
      compoundValueEl.textContent = '--';
      compoundValueEl.style.color = '#7b8db0';
    }

    // ── 3. Cash Flow ──
    new Chart(document.getElementById('cashFlowChart'), {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          data: cashFlows,
          borderColor: '#52C41A',
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: axisConfig()
      }
    });

    // ── 4. Month-on-month Growth ──
    const momLabels = [];
    const increase = [];
    const decrease = [];

    for (let i = 1; i < parsedRecords.length; i++) {
      const diff = parsedRecords[i].total - parsedRecords[i - 1].total;
      momLabels.push(parsedRecords[i].date);
      if (diff >= 0) {
        increase.push(diff);
        decrease.push(0);
      } else {
        increase.push(0);
        decrease.push(diff);
      }
    }

    new Chart(document.getElementById('momChart'), {
      type: 'bar',
      data: {
        labels: momLabels,
        datasets: [
          {
            label: 'Increase',
            data: increase,
            backgroundColor: '#FF6B9D',
            borderRadius: 6,
            barPercentage: 0.5
          },
          {
            label: 'Decrease',
            data: decrease,
            backgroundColor: '#00D4B8',
            borderRadius: 6,
            barPercentage: 0.5
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            grid: { color: gridColor, drawBorder: false },
            ticks: { color: tickColor, font: { size: 10 } }
          },
          y: {
            grid: { color: gridColor, drawBorder: false },
            ticks: {
              color: tickColor,
              font: { size: 11 },
              callback: v => '¥' + v.toLocaleString()
            }
          }
        }
      }
    });

    // 导航交互
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        const links = {
          'Real-time Dashboard': 'Dashboard.html',
          'Asset record': 'asset-record.html',
          'All-weather portfolio': 'all-weather-portfolio.html'
        };
        const text = item.textContent.trim();
        if (links[text]) window.location.href = links[text];
      });
    });
    // 头像上传
    document.getElementById('avatarInput').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('avatarDefault').style.display = 'none';
        const img = document.getElementById('avatarImg');
        img.src = e.target.result;
        img.style.display = 'block';
        localStorage.setItem('userAvatar', e.target.result);
      };
      reader.readAsDataURL(file);
    });

    // 读取已保存的头像
    const savedAvatar = localStorage.getItem('userAvatar');
    if (savedAvatar) {
      document.getElementById('avatarDefault').style.display = 'none';
      const img = document.getElementById('avatarImg');
      img.src = savedAvatar;
      img.style.display = 'block';
    }
  </script>
</body>

</html>
